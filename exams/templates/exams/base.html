<!doctype html>
<html lang="fr">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>{% block title %}Systeme de gestion des examens{% endblock %}</title>
    <style>
      @import url("https://fonts.googleapis.com/css2?family=Manrope:wght@400;500;700;800&family=Space+Grotesk:wght@600;700&display=swap");

      :root {
        --bg: #f4f6f8;
        --surface: #ffffff;
        --text: #14213d;
        --muted: #5f6c7b;
        --line: #dfe4ea;
        --brand: #0f766e;
        --brand-soft: #ccfbf1;
        --accent: #f97316;
        --shadow: 0 18px 45px rgba(20, 33, 61, 0.08);
      }

      * {
        box-sizing: border-box;
      }

      body {
        margin: 0;
        font-family: "Manrope", "Segoe UI", sans-serif;
        color: var(--text);
        background:
          radial-gradient(circle at 0% 0%, #d1fae5 0%, transparent 35%),
          radial-gradient(circle at 100% 100%, #ffedd5 0%, transparent 30%),
          var(--bg);
        min-height: 100vh;
      }

      .navbar {
        position: sticky;
        top: 0;
        z-index: 100;
        backdrop-filter: blur(6px);
        background: rgba(255, 255, 255, 0.92);
        border-bottom: 1px solid var(--line);
      }

      .nav-wrap {
        max-width: 1080px;
        margin: 0 auto;
        padding: 0.9rem 1.2rem;
        display: flex;
        align-items: center;
        justify-content: space-between;
        gap: 1rem;
      }

      .brand {
        font-family: "Space Grotesk", sans-serif;
        font-size: 1.1rem;
        font-weight: 700;
        letter-spacing: 0.3px;
        color: var(--text);
        text-decoration: none;
      }

      .nav-links {
        display: flex;
        gap: 0.55rem;
      }

      .nav-link {
        text-decoration: none;
        color: var(--text);
        border: 1px solid transparent;
        padding: 0.45rem 0.75rem;
        border-radius: 999px;
        font-weight: 600;
        transition: all 0.22s ease;
      }

      .nav-link:hover {
        border-color: var(--line);
        background: #f8fafc;
      }

      .nav-link--cta {
        background: var(--brand);
        color: #ffffff;
      }

      .nav-link--cta:hover {
        background: #0a5c56;
        border-color: #0a5c56;
      }

      .page {
        max-width: 1080px;
        margin: 2rem auto;
        padding: 0 1.2rem 2.5rem;
        animation: rise 320ms ease;
      }

      @keyframes rise {
        from {
          opacity: 0;
          transform: translateY(10px);
        }
        to {
          opacity: 1;
          transform: translateY(0);
        }
      }

      .card {
        background: var(--surface);
        border: 1px solid var(--line);
        border-radius: 16px;
        box-shadow: var(--shadow);
        overflow: hidden;
      }

      .muted {
        color: var(--muted);
      }

      table {
        width: 100%;
        border-collapse: collapse;
        background: #fff;
      }

      th,
      td {
        padding: 0.8rem;
        border-bottom: 1px solid var(--line);
        text-align: left;
      }

      th {
        font-size: 0.86rem;
        text-transform: uppercase;
        letter-spacing: 0.06em;
        color: var(--muted);
        background: #f8fafc;
      }

      @media (max-width: 768px) {
        .nav-wrap {
          flex-direction: column;
          align-items: flex-start;
        }

        .page {
          margin-top: 1rem;
        }

        th,
        td {
          padding: 0.65rem;
          font-size: 0.92rem;
        }
      }
    </style>
  </head>
  <body>
    <!-- Barre de navigation principale -->
    <header class="navbar">
      <div class="nav-wrap">
        <a href="{% url 'home' %}" class="brand"
          >Systeme de gestion des examens</a
        >
        <nav class="nav-links" aria-label="Navigation principale">
          <a href="{% url 'home' %}" class="nav-link">Accueil</a>
          <a href="/admin/" class="nav-link nav-link--cta">Administration</a>
        </nav>
      </div>
    </header>

    <!-- Zone de contenu injectee par les templates enfants -->
    <main class="page">{% block content %}{% endblock %}</main>
  </body>
</html>
